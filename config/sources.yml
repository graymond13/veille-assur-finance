settings:
  freshness_hours: 72
  max_articles_per_day: 18
  top_n: 5
  min_score: 45
  timeout_seconds: 20
  history_file: data/seen_articles.jsonl
  state_file: data/state.json
  site_dir: site
  base_url: ""

sources:
  - id: eba
    name: European Banking Authority
    kind: rss
    category: regulation_institutions
    quality: 96
    language: en
    url: https://www.eba.europa.eu/news-press/news/rss.xml
    enabled: true

  - id: ecb
    name: European Central Bank
    kind: rss
    category: regulation_institutions
    quality: 95
    language: en
    url: https://www.ecb.europa.eu/rss/press.html
    enabled: true

  - id: eiopa
    name: EIOPA Media
    kind: scrape
    category: assurance
    quality: 96
    language: en
    url: https://www.eiopa.europa.eu/media_en
    enabled: true
    require_url_contains:
      - /20
      - _en
    item_selectors:
      - main article
      - .view-content .views-row
      - .node--type-news
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date
      - .field--name-field-publication-date
      - span
    summary_selectors:
      - p

  - id: esma
    name: ESMA News
    kind: scrape
    category: regulation_institutions
    quality: 95
    language: en
    url: https://www.esma.europa.eu/press-news/esma-news
    enabled: true
    require_url_contains:
      - /press-news/esma-news/
    item_selectors:
      - main article
      - .view-content .views-row
      - .search-results__item
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date-display-single
      - .field--name-field-publication-date
      - .date
    summary_selectors:
      - p

  - id: imf
    name: IMF News
    kind: scrape
    category: finance_markets
    quality: 88
    language: en
    url: https://www.imf.org/en/news
    enabled: true
    require_url_contains:
      - /en/News/
    item_selectors:
      - main article
      - .imf-listing-item
      - .coveo-result-frame
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .imf-date
      - .news-date
      - .date
    summary_selectors:
      - p

  - id: google_assurance_fr
    name: Google News – assurance FR
    kind: rss
    category: assurance
    quality: 80
    language: fr
    url: "https://news.google.com/rss/search?q=(assurance%20OR%20assureur%20OR%20assureurs%20OR%20r%C3%A9assurance%20OR%20insurtech%20OR%20%22Solvabilit%C3%A9%20II%22)%20when:3d&hl=fr&gl=FR&ceid=FR:fr"
    enabled: true

  - id: google_banque_finance_fr
    name: Google News – banque / finance FR
    kind: rss
    category: finance_markets
    quality: 80
    language: fr
    url: "https://news.google.com/rss/search?q=(banque%20OR%20banques%20OR%20finance%20OR%20%C3%A9pargne%20OR%20gestion%20d%27actifs%20OR%20fintech%20OR%20march%C3%A9s%20financiers)%20when:3d&hl=fr&gl=FR&ceid=FR:fr"
    enabled: true

  - id: google_regulation_financiere_fr
    name: Google News – réglementation financière FR
    kind: rss
    category: regulation_institutions
    quality: 80
    language: fr
    url: "https://news.google.com/rss/search?q=(r%C3%A9glementation%20financi%C3%A8re%20OR%20conformit%C3%A9%20financi%C3%A8re%20OR%20fraude%20financi%C3%A8re%20OR%20cybers%C3%A9curit%C3%A9%20financi%C3%A8re%20OR%20DORA%20OR%20LCB-FT%20OR%20%22lutte%20contre%20le%20blanchiment%22)%20when:3d&hl=fr&gl=FR&ceid=FR:fr"
    enabled: true

  - id: google_geopolitique_impact_fr
    name: Google News – géopolitique à impact FR
    kind: rss
    category: geopolitique_major
    quality: 80
    language: fr
    url: "https://news.google.com/rss/search?q=((sanctions%20OR%20droits%20de%20douane%20OR%20p%C3%A9trole%20OR%20gaz%20OR%20%C3%A9nergie%20OR%20transport%20maritime%20OR%20risque%20pays)%20AND%20(finance%20OR%20assurance%20OR%20march%C3%A9s%20OR%20commerce))%20when:3d&hl=fr&gl=FR&ceid=FR:fr"
    enabled: true
