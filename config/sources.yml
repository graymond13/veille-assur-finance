    enabled: true

  - id: europarl_econ_monetary
    name: European Parliament - Economic and monetary affairs
    kind: rss
    category: politique_europeenne
    quality: 89
    language: en
    url: https://www.europarl.europa.eu/rss/topic/907/en.xml
    enabled: true

