settings:
  freshness_hours: 72
  max_articles_per_day: 24
  top_n: 5
  min_score: 45
  timeout_seconds: 20
  history_file: data/seen_articles.jsonl
  state_file: data/state.json
  site_dir: site
  base_url: ""

sources:
  # -----------------------------
  # RÉGULATION / SUPERVISION
  # -----------------------------
  - id: eba
    name: European Banking Authority
    kind: rss
    category: regulation_institutions
    quality: 96
    language: en
    url: https://www.eba.europa.eu/news-press/news/rss.xml
    enabled: true

  - id: ecb_press
    name: ECB - Press / speeches / interviews
    kind: rss
    category: finance_markets
    quality: 95
    language: en
    url: https://www.ecb.europa.eu/rss/press.html
    enabled: true

  - id: esrb_press
    name: ESRB - Press releases / speeches / interviews
    kind: rss
    category: regulation_institutions
    quality: 94
    language: en
    url: https://www.esrb.europa.eu/rss/press.xml
    enabled: true

  - id: bis_press
    name: BIS - Press releases
    kind: rss
    category: finance_markets
    quality: 92
    language: en
    url: https://www.bis.org/doclist/all_pressrels.rss
    enabled: true

  - id: amf_regulation_fr
    name: AMF - Réglementation
    kind: rss
    category: regulation_institutions
    quality: 95
    language: fr
    url: https://www.amf-france.org/fr/flux-rss/display/31
    enabled: true

  - id: amf_communiques_fr
    name: AMF - Communiqués / sanctions
    kind: rss
    category: regulation_institutions
    quality: 94
    language: fr
    url: https://www.amf-france.org/fr/flux-rss/display/23
    enabled: true

  - id: acpr_actualites
    name: ACPR - Actualités
    kind: scrape
    category: assurance
    quality: 93
    language: fr
    url: https://acpr.banque-france.fr/fr/actualites
    enabled: true
    require_url_contains:
      - /fr/
    item_selectors:
      - main article
      - .views-row
      - .card
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date
      - span
    summary_selectors:
      - p

  - id: esma_news
    name: ESMA News
    kind: scrape
    category: regulation_institutions
    quality: 95
    language: en
    url: https://www.esma.europa.eu/press-news/esma-news
    enabled: true
    require_url_contains:
      - /press-news/esma-news/
    item_selectors:
      - main article
      - .view-content .views-row
      - .search-results__item
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date-display-single
      - .field--name-field-publication-date
      - .date
    summary_selectors:
      - p

  - id: eiopa_media
    name: EIOPA Media
    kind: scrape
    category: assurance
    quality: 96
    language: en
    url: https://www.eiopa.europa.eu/media_en
    enabled: true
    require_url_contains:
      - /20
      - _en
    item_selectors:
      - main article
      - .view-content .views-row
      - .node--type-news
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date
      - .field--name-field-publication-date
      - span
    summary_selectors:
      - p

  # -----------------------------
  # GÉOPOLITIQUE / POLITIQUE À IMPACT
